name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run nightly to catch upstream Python / Pydantic regressions.
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: unit · py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install nox
        run: pip install nox
      - name: Run unit tests
        run: nox -s tests_unit -- -q

  integration:
    name: integration · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install nox
      - run: nox -s tests_integration -- -q

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nox
      - name: Run coverage
        run: nox -s coverage -- --cov-report=xml --cov-report=term --ignore-glob=tests/benchmarks/test*bench.py
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14
      # Optional: enable Codecov by adding CODECOV_TOKEN to repo secrets.
      - name: Upload to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage.xml
          fail_ci_if_error: false

  pydantic-compat:
    name: pydantic ${{ matrix.pydantic }} compat
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pin a few representative Pydantic 2.x minor versions to catch
        # upstream API drift (lauren depends on pydantic>=2.0).
        pydantic: ["2.0.3", "2.5.3", "2.8.2", "2.11.7"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pip install "pydantic==${{ matrix.pydantic }}"
      - run: python -c "import pydantic; print('pydantic:', pydantic.VERSION)"
      - run: pytest -q
