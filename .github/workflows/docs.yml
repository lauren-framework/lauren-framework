name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - "README.md"
      - "CHANGELOG.md"
      # Rebuild when source changes so mkdocstrings API reference stays fresh.
      - "lauren/**"
      - ".github/workflows/docs.yml"
      - "noxfile.py"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed for the deploy job below.
  pages: write
  id-token: write

jobs:
  build:
    name: Build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install nox
      - name: Re-generate plain-Markdown API reference (for lauren-website)
        run: |
          pip install griffe
          python scripts/generate_api_docs.py
      - name: Build site
        run: nox -s docs
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 14
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # --------------------------------------------------------------------------
  # Deploy to GitHub Pages — only on pushes to main
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
