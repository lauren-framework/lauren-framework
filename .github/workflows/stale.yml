name: stale

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this is still relevant, drop a comment or remove the `stale` label.
          close-issue-message: |
            This issue has been closed because it has been stale for 14 days with
            no activity. Feel free to re-open with new information.
          exempt-issue-labels: "pinned,security,good first issue,help wanted,roadmap"
          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further activity occurs.
          close-pr-message: |
            This pull request has been closed because it has been stale for 14 days
            with no activity. Feel free to re-open it.
          exempt-pr-labels: "pinned,security,blocked,wip"
          operations-per-run: 60
