site_name: Lauren Framework
site_description: A metadata-first, enterprise-ready Python web framework — inspired by Axum, FastAPI, and NestJS.
site_author: Lauren Framework Team
site_url: https://lauren-framework.dev/
repo_url: https://github.com/your-org/lauren
repo_name: lauren
copyright: Copyright &copy; 2026 Lauren Framework — Enterprise-grade Python ASGI

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/atom

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/lauren
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/lauren/
  generator: false
  status:
    new: Recently added
    deprecated: Deprecated

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Why Lauren?: getting-started/why-lauren.md
    - Prominent Features: getting-started/features.md
  - Core Concepts:
    - core-concepts/index.md
    - Modules: core-concepts/modules.md
    - Controllers: core-concepts/controllers.md
    - Injectables & Providers: core-concepts/injectables.md
    - Class Inheritance Rules: core-concepts/inheritance.md
    - Lifecycle Hooks: core-concepts/lifecycle.md
    - Request & Response: core-concepts/request-response.md
  - Guides:
    - guides/index.md
    - Declaring an Injectable: guides/declaring-injectables.md
    - Custom Providers: guides/custom-providers.md
    - Implicit Parameter Extraction: guides/implicit-params.md
    - Sync vs Async Handlers: guides/sync-handlers.md
    - Custom Extractors: guides/custom-extractors.md
    - Custom Guards: guides/custom-guards.md
    - Custom Middleware: guides/custom-middleware.md
    - Interceptors: guides/interceptors.md
    - Custom Exception Handlers: guides/custom-exception-handlers.md
    - WebSockets: guides/websockets.md
    - Server-Sent Events: guides/server-sent-events.md
    - Circular Module Imports: guides/circular-module-imports.md
    - OpenAPI Security from Guards: guides/openapi-security.md
    - Proxy & Static Files: guides/proxy-and-static-files.md
  - Concepts:
    - Extractors vs Dependencies vs Guards vs Middlewares: concepts/extractors-vs-dependencies-vs-guards-vs-middlewares.md
  - Comparisons:
    - comparisons/index.md
    - vs FastAPI, Litestar & BlackSheep: comparisons/python-frameworks.md
  - Reference:
    - reference/index.md
    - Error Catalog: reference/errors.md
    - Cheat Sheet: reference/cheat-sheet.md
  - Development:
    - development/index.md
    - Release Guide: development/release.md
    - Versioning: development/versioning.md
